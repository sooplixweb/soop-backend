services:
  db:
    image: postgres:16-alpine
    container_name: soop-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soop_backend
    ports:
      - "5432:5432"
    volumes:
      - soop_backend_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soop_backend"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    container_name: soop-backend-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/soop_backend
      PORT: 3000
      CORS_ORIGIN: http://localhost:8080
      RUN_MIGRATIONS: "true"
      SEED_ON_START: "true"
      DATABASE_SSL: "false"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  soop_backend_postgres:
